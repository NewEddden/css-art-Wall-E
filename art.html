<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>wall-e</title>
  </head>
  <body>
    <div class="back">
      <div class="earth"></div>
      <div class="ground"></div>
      <div class="tag">WALL·E</div>
      <div class="big_container">
        <div class="wall-e">

          <!-- Head -->
          <div class="head">
            <div class="base-of-head">
              <div class="realmainneck"></div>
            </div>
            <div class="eye-container">
              <div class="eyes">
                <div class="eyebolts"></div>
                <div class="lenses"></div>
                <div class="left-lenses"></div>
              </div>
            </div>
          </div>

          <!-- Torso -->
          <div class="torso">
            <div class="torso-middlebody-lines"></div>
            <div class="torso-middlebody-bodydamage"></div>
            <div class="torsoredbtns"></div>
            <div class="oil"></div>
            <div class="torso-traps">
              <div class="torso-traps-controll-panel">
                <div class="controll-panel-left-btns"></div>
                <div class="controll-panel-right-btns"></div>
              </div>
            </div>
          </div>

          <!-- Limbs -->
          <div class="limbs">
            <div class="left-tread">
              <div class="tread-lines"></div>
            </div>
            <div class="right-tread">
              <div class="tread-lines"></div>
            </div>

            <div class="arms">
              <div class="boxes"></div>
              <div class="left-arms">
                <div class="left-hands">
                  <div class="lines"></div>
                  <div class="left-lines"></div>
                  <div class="top-lines"></div>
                  <div class="left-bottom-lines"></div>
                </div>
              </div>
              <div class="right-arms">
                <div class="right-hands">
                  <div class="lines"></div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
